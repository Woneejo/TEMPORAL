<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial scale">
        <title>Login y Registro</title>
        <!--Estilos y/o Fuentes-->
        <link rel="stylesheet" href="css/estilo.css">
    </head>
 
    <body onload="inicializarLogin()">
    <div class="form-contenedor">
        <div class="form-columna">
            <div class="boton-box">
                <button class="boton b-1" id="login">Inciar sesion</button>
                <button class="boton b-2" id="registro">Registrate</button>
            </div>

            <!--Contenedor del Login-->            
            <form class="form-box login-form">
                <div class="form-titulo">
                    <span>Inicia Sesion</span>
                </div>
                <div class="form-inputs">
                    <div class="input-box">
                        <input type="number" class="inputs input-campo" placeholder="Cedula">
                        <ion-icon name="person-outline" class="icono"></ion-icon>
                </div>
                <div class="input-box">
                    <input type="password" class="inputs input-campo" placeholder="Contrasena">
                    <ion-icon name="lock-closed-outline" class="icono"></ion-icon>
            </div>
            <div class="olvidaste-contrasena">
                <a href="#">Olvisdaste tu contrasena?</a>
            </div>
            <div class="input-box">
                <button class="inputs iniciar-btn">
                <span>Iniciar Sesion</span>
                <ion-icon name="enter-outline"></ion-icon>
            </button>
            </div>
            </form>
        </div>
    </div>

        <!--LLAMEN A DIOS POR QUE VIENE EL CONTENEDOR DEL REGISTRO-->
        <form class="form-box registro-form">
            <div class="form-titulo">
                <span>Registrate</span>
            </div>
            <div class="form-inputs">
                <div class="input-box">
                    <input type="number" class="inputs input-campo" placeholder="Cedula">
                    <ion-icon name="person-outline" class="icono"></ion-icon>
            </div>
            <div class="input-box">
                <input type="password" class="inputs input-campo" placeholder="Contrasena" minlength="8" maxlength="16">
                <ion-icon name="lock-closed-outline" class="icono"></ion-icon>
        </div>
        <div class="input-box">
            <input type="password" class="inputs input-campo" placeholder="Contrasena" minlength="8" maxlength="16">
            <ion-icon name="lock-closed-outline" class="icono"></ion-icon>
    </div>
        <div class="recuerdame">
            <input type="checkbox" id="recuerdame-check">
            <label for="recuerdame-check">Recuerdame</label>
        </div>
        <div class="input-box">
            <button class="inputs iniciar-btn">
            <span>Crear cuenta</span>
            <ion-icon name="enter-outline"></ion-icon>
        </button>
        </div>
        </form>
    </div>
</div>
       
       
       
       
       
       
       
       
       
       
    <script src="leo.js"></script>
    <!--Link Rel de los iconos utilitarios-->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    
    
    
    
    
    
    
</body>
    
</html>
